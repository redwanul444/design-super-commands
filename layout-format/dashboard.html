<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{PAGE_DESCRIPTION}}">
  <title>{{PAGE_TITLE}} | {{PROJECT_NAME}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family={{FONT_HEADING}}:wght@400;500;600;700&family={{FONT_BODY}}:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '{{PRIMARY_COLOR}}',
            accent: '{{ACCENT_COLOR}}',
            success: '{{SUCCESS_COLOR}}',
            warning: '{{WARNING_COLOR}}',
            danger: '{{ERROR_COLOR}}',
          },
          fontFamily: {
            heading: ['{{FONT_HEADING}}', 'sans-serif'],
            body: ['{{FONT_BODY}}', 'sans-serif'],
          },
          borderRadius: {
            card: '{{CARD_RADIUS}}',
            btn: '{{BUTTON_RADIUS}}',
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    :root {
      --bg: {{SURFACE_BG}};
      --surface: {{SURFACE_COLOR}};
      --text-primary: {{TEXT_PRIMARY}};
      --text-secondary: {{TEXT_SECONDARY}};
      --border: {{BORDER_COLOR}};
      --primary: {{PRIMARY_COLOR}};
      --accent: {{ACCENT_COLOR}};
      --shadow: {{SHADOW}};
    }
    [data-theme="dark"] {
      --bg: {{BG_DARK}};
      --surface: {{SURFACE_DARK}};
      --text-primary: {{TEXT_PRIMARY_DARK}};
      --text-secondary: {{TEXT_SECONDARY_DARK}};
      --border: {{BORDER_DARK}};
    }
    body { font-family: '{{FONT_BODY}}', sans-serif; background: var(--bg); color: var(--text-primary); }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
    .phone-frame {
      width: 375px; height: 812px; margin: 24px auto;
      background: var(--bg); color: var(--text-primary);
      border-radius: 40px; border: 3px solid #2a2a3a;
      overflow: hidden; position: relative;
      box-shadow: 0 0 80px rgba(0,0,0,0.4), 0 20px 60px rgba(0,0,0,0.6);
    }
    .phone-screen { height: 100%; overflow-y: auto; padding-bottom: 80px; scrollbar-width: none; }
    .phone-screen::-webkit-scrollbar { display: none; }
    .phone-frame::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 150px; height: 28px; background: var(--bg);
      border-radius: 0 0 18px 18px; z-index: 200;
    }
  </style>
</head>
<body class="min-h-screen {{BG_CLASS}} {{TEXT_CLASS}}">
  <div class="max-w-[1440px] mx-auto">
    {{NAVIGATION}}
    <div class="flex flex-col lg:flex-row gap-6 p-4 lg:p-8 pt-20 lg:pt-24">
      <aside class="w-full lg:w-64 flex-shrink-0">
        <div class="bg-[var(--surface)] {{BORDER_CLASS}} rounded-card {{SHADOW_CLASS}} p-4 lg:sticky lg:top-24">
          <nav class="space-y-1">
            {{SIDEBAR_ITEMS}}
          </nav>
        </div>
      </aside>
      <main class="flex-1 min-w-0 space-y-6">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
          <div>
            <h1 class="text-{{H1_SIZE}} font-bold font-heading">{{PAGE_HEADING}}</h1>
            <p class="text-{{TEXT_SECONDARY_CLASS}} text-sm mt-1">{{PAGE_SUBTITLE}}</p>
          </div>
          <div class="flex items-center gap-3">
            {{PAGE_ACTIONS}}
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
          {{STATS_CARDS}}
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <div class="lg:col-span-2 bg-[var(--surface)] {{BORDER_CLASS}} rounded-card {{SHADOW_CLASS}} p-6">
            <h3 class="text-lg font-semibold font-heading mb-4">{{MAIN_CONTENT_TITLE}}</h3>
            {{MAIN_CONTENT}}
          </div>
          <div class="bg-[var(--surface)] {{BORDER_CLASS}} rounded-card {{SHADOW_CLASS}} p-6">
            <h3 class="text-lg font-semibold font-heading mb-4">{{SIDE_CONTENT_TITLE}}</h3>
            {{SIDE_CONTENT}}
          </div>
        </div>
        {{EXTRA_SECTIONS}}
      </main>
    </div>
    {{FOOTER}}
  </div>
  {{VARIATION_NAV}}
  <script>lucide.createIcons();</script>
  <script>
    (function() {
      var theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</body>
</html>
